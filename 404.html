<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Edge5</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#C9952A">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/footer.css">
  <style>
    .error-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-height));
      text-align: center;
      padding: var(--sp-6);
    }
    .error-page__code {
      font-size: 96px;
      font-weight: 700;
      color: rgba(201,149,42,0.15);
      line-height: 1;
      margin-bottom: var(--sp-4);
    }
    .error-page__title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: var(--sp-3);
    }
    .error-page__text {
      color: var(--color-grey);
      margin-bottom: var(--sp-8);
      max-width: 400px;
    }
    .error-page__actions {
      display: flex;
      gap: var(--sp-3);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div id="header-mount"></div>
  <main>
    <div class="error-page">
      <div>
        <div class="error-page__code">404</div>
        <h1 class="error-page__title">Page not found</h1>
        <p class="error-page__text">The page you're looking for doesn't exist or may have moved.</p>
        <div class="error-page__actions">
          <a href="/index.html" class="btn btn--gold">Go Home</a>
          <a href="/counsellor.html" class="btn btn--outline-gold">Start Counselling</a>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-mount"></div>
  <script src="/js/header.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
